# Local integration test stack for MemStack.
# Usage: docker compose up -d
# Then run adapters against real instances for manual testing.
# Not yet wired to an automated test suite.
# Tear down: docker compose down -v

version: "3.8"

services:
  # PostgreSQL 17 with pgvector extension for vector similarity search
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: memstack
      POSTGRES_PASSWORD: memstack
      POSTGRES_DB: memstack
    ports:
      - "5433:5432"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memstack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Stack with RediSearch module for full-text search
  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6380:6379"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j 5 graph database with APOC plugin for graph storage
  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/memstack123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 64m
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p memstack123 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 10
      retries: 5

  # Qdrant vector database for high-performance similarity search
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Weaviate vector database with anonymous access for local development
  weaviate:
    image: semitechnologies/weaviate:latest
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "node1"
    ports:
      - "8080:8080"
      - "50051:50051"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 10s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: memstack
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 5
