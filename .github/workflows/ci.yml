name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install
      - run: npx tsup src/index.ts --format cjs,esm --dts --clean
      - run: npx tsc --noEmit
      - run: npx vitest run

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install
      - run: cd packages/mcp && npx tsup src/index.ts src/cli.ts --format esm --dts --clean
      - run: cd packages/mcp && npx tsc --noEmit
      - run: cd packages/mcp && npx vitest run

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install
      - run: cd packages/cli && npx tsup src/cli.ts --format esm --clean
      - run: cd packages/cli && npx tsc --noEmit
      - run: cd packages/cli && npx vitest run

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }
      - run: pnpm install
      - run: cd packages/server && npx tsup src/index.ts --format esm --clean
      - run: cd packages/server && npx tsc --noEmit
      - run: cd packages/server && npx vitest run

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [core, mcp, cli, server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: 'https://registry.npmjs.org' }
      - run: pnpm install
      - run: pnpm publish -r --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
